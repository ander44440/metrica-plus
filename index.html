<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Métrica+</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <!-- TOPO MOBILE -->
     <!-- SPLASH SCREEN -->
  <div id="splashScreen" class="splashScreen">
    <div class="splashConteudo">
      <div class="logoSplashWrap">
        <img src="img/logo-metrica.png" alt="Métrica+" class="logoSplash">
        <span class="brilhoLogo"></span>
      </div>

      <p class="textoSplash">Técnico, seja bem-vindo ao Métrica+</p>
    </div>
  </div>
  
  <header class="topoMobile">
    <button class="btnMenuTopo" onclick="abrirMenuLateral()">
      <i class="fa-solid fa-bars"></i>
    </button>

    <div class="marcaTopo">
      <img src="img/logo-metrica.png" class="logoTopo" alt="Métrica+">
      <div class="textoTopo">
        <strong>Métrica+ HVAC Tools Brasil</strong>
        <span>FERRAMENTA TÉCNICA PARA USO EM CAMPO</span>
      </div>
    </div>

    <button class="btnTopoDireita btnLimpar" onclick="limparModuloAtual()">
      <i class="fa-solid fa-eraser"></i>
    </button>

  </header>

  <!-- OVERLAY -->
  <div class="overlayMenu" id="overlayMenu" onclick="fecharMenuLateral()"></div>

  <!-- MENU LATERAL -->
  <aside class="menuLateral" id="menuLateral">
    <div class="topoMenuLateral">
      <button class="btnFecharMenu" onclick="fecharMenuLateral()">
        <i class="fa-solid fa-xmark"></i>
      </button>

      <div class="marcaTopo">
        <img src="img/logo-metrica.png" class="logoTopo" alt="Métrica+">
        <div class="textoTopo">
          <strong>Métrica+</strong>
          <span>Ferramenta Técnica</span>
        </div>
      </div>
    </div>

    <div class="grupoMenuLateral">
      <p class="tituloGrupoMenu">Ferramentas</p>

      <button class="itemMenu" onclick="navegarModulo('home')">
        <span class="itemMenuEsq">🏠 <span>Home</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('temperatura')">
        <span class="itemMenuEsq">🌡 <span>Temperatura</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('btu')">
        <span class="itemMenuEsq">❄ <span>BTU ↔ W</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('pressao')">
        <span class="itemMenuEsq">📊 <span>Pressão</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('vazao')">
        <span class="itemMenuEsq">💨 <span>Vazão</span></span>
        <span class="itemMenuSeta">›</span>
      </button>
      
      <button class="itemMenu" onclick="navegarModulo('conversor')">
        <span class="itemMenuEsq">📏 <span>Métrico / IP</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('eletrica')">
        <span class="itemMenuEsq">⚡ <span>Elétrica</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('deltaT')">
        <span class="itemMenuEsq">📉 <span>Delta T</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('superheat')">
        <span class="itemMenuEsq">🔥 <span>Superheat</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('subcool')">
        <span class="itemMenuEsq">❄ <span>Subcool</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('tempo')">
        <span class="itemMenuEsq">⏱ <span>Tempo</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('tabelaPT')">
        <span class="itemMenuEsq">📘 <span>Tabela PT</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('diagnostico')">
        <span class="itemMenuEsq">🧠 <span>Diagnóstico</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('diagnosticoAvancado')">
        <span class="itemMenuEsq">🚀 <span>Diagnóstico Avançado</span></span>
        <span class="itemMenuSeta">›</span>
      </button>

      <button class="itemMenu" onclick="navegarModulo('fluidos')">
        <span class="itemMenuEsq">🧪 <span>Régua de Fluidos</span></span>
        <span class="itemMenuSeta">›</span>
      </button>
    </div>
  </aside>

  <!-- MENU ANTIGO -->
  <div class="menuMobile">
    <button onclick="abrirModulo('home')">
      <i class="fa-solid fa-house"></i>
    </button>

    <button onclick="abrirModulo('temperatura')">
      <i class="fa-solid fa-temperature-half"></i>
    </button>

    <button onclick="abrirModulo('btu')">
      <i class="fa-solid fa-snowflake"></i>
    </button>

    <button onclick="abrirModulo('eletrica')">
      <i class="fa-solid fa-bolt"></i>
    </button>

    <button onclick="abrirModulo('diagnosticoAvancado')">
      <i class="fa-solid fa-stethoscope"></i>
    </button>
  </div>

  <div class="app">
    <div class="conteudo">
      <div id="modulo" class="homeAtiva"></div>
    </div>
  </div>

  <script src="js/conversores.js"></script>
  <script src="js/refrigeracao.js"></script>
  <script src="js/eletrica.js"></script>
  <script src="js/diagnostico.js"></script>
  <script src="js/fluidos.js"></script>
  <script src="js/app.js"></script>
  <script>
    
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => console.log("SW registrado:", reg.scope))
      .catch(err => console.log("Erro SW:", err));
  });
}
</script>
</body>
</html>
